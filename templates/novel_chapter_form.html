{% extends "base.html" %}
{% block title %}{{ '编辑章节' if chapter else '新增章节' }}{% endblock %}
{% block content %}

<h1>{{ '编辑章节' if chapter else '新增章节' }} · {{ novel.title }}</h1>

<form class="form" method="post">
  <label>
    章节标题
    <input type="text" name="title" required value="{{ chapter.title if chapter else '' }}">
  </label>

  <label>
    正文
    <textarea name="content" rows="20">{{ chapter.content if chapter else '' }}</textarea>
  </label>

  <div class="actions">
    <button type="submit">保存</button>
    <a class="btn-link" href="{{ url_for('novel_edit', novel_id=novel.id) }}">取消</a>
  </div>
</form>

{% endblock %}
